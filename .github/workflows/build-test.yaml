name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *' # Runs daily at 16:00 UTC

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - id: restore-rabbitmq-server-cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/rabbitmq-server
          key: rmq-v3.13.7-otp-26-elixir-1.16
      - id: maybe-fail-rabbitmq-server-miss
        if: steps.restore-rabbitmq-server-cache.outputs.cache-hit != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            core.setFailed('could not restore cached rabbitmq-server build');
      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: 26
          elixir-version: 1.16
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: rabbitmq-server/deps/rabbitmq_queue_migration
      - run: make -C ${{ github.workspace }}/rabbitmq-server/deps/rabbitmq_queue_migration
      - run: make -C ${{ github.workspace }}/rabbitmq-server/deps/rabbitmq_queue_migration tests
      - name: Build plugin ez file
        run: |
          make -C ${{ github.workspace }}/rabbitmq-server/deps/rabbitmq_queue_migration DIST_AS_EZS=true dist
          cp -vf ${{ github.workspace }}/rabbitmq-server/deps/rabbitmq_queue_migration/plugins/rabbitmq_queue_migration-*.ez \
            ${{ github.workspace }}/rabbitmq_queue_migration.ez
      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rabbitmq_queue_migration.ez
          path: ${{ github.workspace }}/rabbitmq_queue_migration.ez
          retention-days: 1

  integration-test:
    needs: build-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rabbitmq_queue_migration.ez
          path: ${{ github.workspace }}/test/integration/docker
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - run: |
          echo "127.0.0.1 rmq0" | sudo tee -a /etc/hosts
          echo "127.0.0.1 rmq1" | sudo tee -a /etc/hosts
          echo "127.0.0.1 rmq2" | sudo tee -a /etc/hosts
      - run: make --file ${{ github.workspace }}/integration-test.mk integration-test
      - if: failure()
        run: |
          echo "=== rmq0 Logs ==="
          docker compose --file ${{ github.workspace }}/test/integration/docker/docker-compose.yml logs rmq0 --tail 100
          echo ""
          echo "=== rmq1 Logs ==="
          docker compose --file ${{ github.workspace }}/test/integration/docker/docker-compose.yml logs rmq1 --tail 100
          echo ""
          echo "=== rmq2 Logs ==="
          docker compose --file ${{ github.workspace }}/test/integration/docker/docker-compose.yml logs rmq2 --tail 100
