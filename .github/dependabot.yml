version: 2
updates:
  - package-ecosystem: "maven"
    directory: "test/integration"
    schedule:
      interval: "weekly"
    groups:
      maven:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
